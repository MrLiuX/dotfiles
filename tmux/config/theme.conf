# theme

# status left look and feel
set -g status-left-length 100                          # 状态栏左侧最大长度，防止过长被截断
set -g status-left ""                                  # 清空状态栏左侧内容，为后续拼接做准备
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold] [#S] },#{#[bg=#{@thm_maroon},fg=#{@thm_bg}] [#S] }}"   # 按下 prefix 键时显示红底白字 session 名，否则绿字正常显示
#set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"                                                      # 第一个分隔符，使用 overlay_0 颜色
#set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_maroon}]  #{pane_current_command} "                                   # 显示当前窗格内的命令名，褐色
#set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"                                                      # 第二个分隔符
#set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}] #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "           # 显示当前路径，用户名替换为 ~，最长32字符截断，蓝色
#set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"                              # 窗口缩放状态下显示分隔符，否则不显示
#set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"                               # 缩放状态下显示黄色的 "zoom"

# status right look and feel
set -g status-right-length 100                         # 状态栏右侧最大长度
set -g status-right ""                                 # 清空右侧内容
set -ga status-right "#{?#{e|>=:10,#{battery_percentage}},#{#[bg=#{@thm_red},fg=#{@thm_bg}]},#{#[bg=#{@thm_bg},fg=#{@thm_pink}]}} #{battery_icon} #{battery_percentage} "   # 电池电量低于10%时红底白字，否则粉红色；显示电池图标和百分比
#set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]│"                                                 # 分隔符
#set -ga status-right "#[bg=#{@thm_bg}]#{?#{==:#{online_status},ok},#[fg=#{@thm_mauve}] 󰖩 on ,#[fg=#{@thm_red},bold]#[reverse] 󰖪 off }" # 在线时显示紫色 "on"，离线时红色反白 "off"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]│"                                                 # 分隔符
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}] %H:%M "          

# Configure Tmux
#set -g status-position top                             # 状态栏置于顶部（而非默认底部）
set -g status-style "bg=#{@thm_bg}"                    # 状态栏整体背景使用主题背景色
#set -g status-justify "absolute-centre"                # 窗口列表居中对齐

# pane border look and feel
setw -g pane-border-status top                         # 窗格状态显示在边框顶部
setw -g pane-border-format ""                          # 清空窗格边框默认格式，不显示窗格号等信息
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"   # 活动窗格边框使用 overlay_0 颜色
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"   # 非活动窗格边框使用 overlay_0 颜色
#setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"          # 非活动窗格边框使用较暗的 surface_0
setw -g pane-border-lines single                       # 窗格边框使用单线（还可选 double, heavy 等）                               # 蓝色显示日期和时间

