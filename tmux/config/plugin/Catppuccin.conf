# 3.Catppuccin 配置
# ###############################################
set -g @catppuccin_flavor "mocha"                  # 设置主题风味为 macchiato（可选 latte, frappe, macchiato, mocha）
set -g @catppuccin_window_status_style "none"          # 窗口状态不应用额外主题样式（也可选 basic, rounded, slanted, custom）
#set -g @catppuccin_pane_status_enabled "off"           # 关闭窗格状态显示（默认显示窗格路径等信息）
#set -g @catppuccin_pane_border_status "on"            # 关闭窗格边框上的状态信息
